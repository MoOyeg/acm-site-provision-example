#
# Ansible managed
#
# Site definition for tnf — a 2-node OpenShift cluster at a
# remote site. Two control-plane nodes with Pacemaker fencing (TNF).
#
# This file is the *what*: names, network, and each node's BMC. The *how* lives
# in the templates referenced by templateRefs, which the SiteConfig operator
# merges with this CR to render ClusterDeployment, AgentClusterInstall,
# InfraEnv, BareMetalHost, NMStateConfig, ManagedCluster and
# KlusterletAddonConfig.
apiVersion: siteconfig.open-cluster-management.io/v1alpha1
kind: ClusterInstance
metadata:
  name: tnf
  namespace: tnf
spec:
  clusterName: tnf
  baseDomain: tide.lan
  clusterType: HighlyAvailable
  clusterImageSetNameRef: img4.21.11-x86-64-appsub
  cpuArchitecture: x86_64
  networkType: OVNKubernetes
  pullSecretRef:
    name: pull-secret
  sshPublicKey: "ssh-rsa  moyo@rhel-idm"
  clusterNetwork:
    - cidr: 10.128.0.0/14
      hostPrefix: 23
  serviceNetwork:
    - cidr: 172.30.0.0/16
  machineNetwork:
    - cidr: 192.168.4.0/23
  # Required once a cluster has more than one node. Owned by the cluster's own
  # keepalived, so these must be free addresses rather than node IPs.
  apiVIPs:
    - 192.168.4.103
  ingressVIPs:
    - 192.168.4.104
  # Swap these for ibi-* templates to install the same site with the
  # Image-Based Installer instead — the site definition does not change.
  templateRefs:
    - name: ai-cluster-templates-v1
      namespace: open-cluster-management
  # Install-time manifests applied to THIS SITE's cluster (extra-manifests.yaml).
  # These reach the spoke; templateRefs above render onto the hub.
  #
  # Immutable once the ClusterInstance exists, so it is only emitted for sites
  # that are not provisioned yet — otherwise the admission webhook rejects the
  # change and Argo CD can never sync.
  extraManifestsRefs:
    - name: tnf-extra-manifests
  nodes:
    - hostName: "tnf-node1.tnf.tide.lan"
      role: master
      bootMode: legacy
      automatedCleaningMode: disabled
      extraAnnotations:
        BareMetalHost:
          # How Pacemaker gets the credentials to fence its peer. BMAC creates a
          # fencing-credentials secret from this host's own BMC secret; there is
          # no fencing field in the ClusterInstance API.
          bmac.agent-install.openshift.io/create-fencing-credentials-secret: "true"
      # The libvirt domain behind the sushy-tools Redfish emulator. The operator
      # renders the BareMetalHost from this and Ironic drives the machine over
      # Redfish virtual media.
      bmcAddress: "redfish-virtualmedia://192.168.5.132:8002/redfish/v1/Systems/9ae9bffa-24e3-4172-8253-c00c871ffcc6"
      bmcCredentialsName:
        name: tnf-node1-bmc-credentials
      bootMACAddress: "52:54:00:9b:37:f0"
      rootDeviceHints:
        deviceName: /dev/vda
      nodeNetwork:
        # Rendered into an NMStateConfig by the node template. The MAC is mapped
        # to the logical name used below, so nmstate binds to the right NIC
        # regardless of how the guest enumerates it.
        interfaces:
          - name: enp1s0
            macAddress: "52:54:00:9b:37:f0"
        config:
          interfaces:
            - name: enp1s0
              type: ethernet
              state: up
              ipv4:
                enabled: true
                dhcp: false
                address:
                  - ip: 192.168.4.105
                    prefix-length: 23
              ipv6:
                enabled: false
          dns-resolver:
            config:
              server:
                - 192.168.5.5
          routes:
            config:
              - destination: 0.0.0.0/0
                next-hop-address: 192.168.5.5
                next-hop-interface: enp1s0
      templateRefs:
        - name: ai-node-templates-v1
          namespace: open-cluster-management
    - hostName: "tnf-node2.tnf.tide.lan"
      role: master
      bootMode: legacy
      automatedCleaningMode: disabled
      extraAnnotations:
        BareMetalHost:
          # How Pacemaker gets the credentials to fence its peer. BMAC creates a
          # fencing-credentials secret from this host's own BMC secret; there is
          # no fencing field in the ClusterInstance API.
          bmac.agent-install.openshift.io/create-fencing-credentials-secret: "true"
      # The libvirt domain behind the sushy-tools Redfish emulator. The operator
      # renders the BareMetalHost from this and Ironic drives the machine over
      # Redfish virtual media.
      bmcAddress: "redfish-virtualmedia://192.168.5.132:8002/redfish/v1/Systems/80132d8a-8f3d-4103-89bf-82247a8f9d92"
      bmcCredentialsName:
        name: tnf-node2-bmc-credentials
      bootMACAddress: "52:54:00:a9:f6:cd"
      rootDeviceHints:
        deviceName: /dev/vda
      nodeNetwork:
        # Rendered into an NMStateConfig by the node template. The MAC is mapped
        # to the logical name used below, so nmstate binds to the right NIC
        # regardless of how the guest enumerates it.
        interfaces:
          - name: enp1s0
            macAddress: "52:54:00:a9:f6:cd"
        config:
          interfaces:
            - name: enp1s0
              type: ethernet
              state: up
              ipv4:
                enabled: true
                dhcp: false
                address:
                  - ip: 192.168.4.106
                    prefix-length: 23
              ipv6:
                enabled: false
          dns-resolver:
            config:
              server:
                - 192.168.5.5
          routes:
            config:
              - destination: 0.0.0.0/0
                next-hop-address: 192.168.5.5
                next-hop-interface: enp1s0
      templateRefs:
        - name: ai-node-templates-v1
          namespace: open-cluster-management
