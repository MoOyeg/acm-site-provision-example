#
# Ansible managed
#
# ACM registration for the tnf cluster.
#
# A TNF cluster has no ClusterInstance: it is installed by
# `openshift-install create cluster` because it needs
# controlPlane.fencing.credentials, which the SiteConfig / Assisted APIs do not
# model. What *can* be declared in Git is its registration with the hub, which
# is what these manifests are.
#
# Argo CD syncs this ManagedCluster, and ACM then waits for an
# auto-import-secret carrying the cluster's kubeconfig before it installs the
# klusterlet. That secret is a credential, so it is created out of band by the
# acm_import role rather than committed here.
apiVersion: cluster.open-cluster-management.io/v1
kind: ManagedCluster
metadata:
  name: tnf
  labels:
    cloud: BareMetal
    vendor: OpenShift
    # Makes the two provisioning paths distinguishable in the ACM fleet view.
    provisioned-by: openshift-install-ipi
    topology: two-node-fencing
spec:
  hubAcceptsClient: true
