# Install-time manifests for sno2-cluster2, referenced from the ClusterInstance via
# spec.extraManifestsRefs. The SiteConfig operator passes this ConfigMap to the
# Assisted Installer, which applies its contents to the spoke while the cluster
# is being installed -- so every site comes up already configured, with no
# post-install drift to remediate.
#
# Applied at install time only: changing this on a running cluster does nothing
# until the site is reinstalled.
#
# Generated by scripts/04-render-sites.sh — edit scripts/lib/machineconfigs.sh.
apiVersion: v1
kind: ConfigMap
metadata:
  name: sno2-cluster2-extra-manifests
  namespace: sno2-cluster2
data:
  # Retail / industrial edge profile — constrained hardware, no on-site staff.
  99-master-journald-limits.yaml: |
    apiVersion: machineconfiguration.openshift.io/v1
    kind: MachineConfig
    metadata:
      name: 99-master-journald-limits
      labels:
        machineconfiguration.openshift.io/role: master
    spec:
      config:
        ignition:
          version: 3.2.0
        storage:
          files:
              - path: /etc/systemd/journald.conf
                mode: 420
                overwrite: true
                contents:
                  source: data:text/plain;charset=utf-8;base64,
  99-master-chrony-site.yaml: |
    apiVersion: machineconfiguration.openshift.io/v1
    kind: MachineConfig
    metadata:
      name: 99-master-chrony-site
      labels:
        machineconfiguration.openshift.io/role: master
    spec:
      config:
        ignition:
          version: 3.2.0
        storage:
          files:
              - path: /etc/chrony.conf
                mode: 420
                overwrite: true
                contents:
                  source: data:text/plain;charset=utf-8;base64,
