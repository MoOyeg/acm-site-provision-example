#
# Ansible managed
#
# Install-time manifests for sno1-cluster2 (telco_ran_du profile),
# referenced from the ClusterInstance via spec.extraManifestsRefs.
#
# The SiteConfig operator passes this ConfigMap to the Assisted Installer, which
# applies its contents to the spoke while the cluster is being installed -- so
# the site comes up already configured, with no post-install drift to remediate.
#
# Applied at install time only: changing this on a running cluster does nothing
# until the site is reinstalled.
apiVersion: v1
kind: ConfigMap
metadata:
  name: sno1-cluster2-extra-manifests
  namespace: sno1-cluster2
data:
  02-master-workload-partitioning.yaml: |
    apiVersion: machineconfiguration.openshift.io/v1
    kind: MachineConfig
    metadata:
      name: 02-master-workload-partitioning
      labels:
        machineconfiguration.openshift.io/role: master
    spec:
      config:
        ignition:
          version: 3.2.0
        storage:
          files:
            - path: /etc/crio/crio.conf.d/01-workload-partitioning
              mode: 420
              overwrite: true
              contents:
                # 01-workload-partitioning — decoded content lives in
                # roles/site_manifests/vars/main.yml
                source: data:text/plain;charset=utf-8;base64,W2NyaW8ucnVudGltZS53b3JrbG9hZHMubWFuYWdlbWVudF0KYWN0aXZhdGlvbl9hbm5vdGF0aW9uID0gInRhcmdldC53b3JrbG9hZC5vcGVuc2hpZnQuaW8vbWFuYWdlbWVudCIKYW5ub3RhdGlvbl9wcmVmaXggPSAicmVzb3VyY2VzLndvcmtsb2FkLm9wZW5zaGlmdC5pbyIKcmVzb3VyY2VzID0geyAiY3B1c2hhcmVzIiA9IDAsICJjcHVzZXQiID0gIjAtMSIgfQo=
            - path: /etc/kubernetes/openshift-workload-pinning
              mode: 420
              overwrite: true
              contents:
                # openshift-workload-pinning — decoded content lives in
                # roles/site_manifests/vars/main.yml
                source: data:text/plain;charset=utf-8;base64,ewogICJtYW5hZ2VtZW50IjogewogICAgImNwdXNldCI6ICIwLTEiCiAgfQp9Cg==
  99-master-chrony-site.yaml: |
    apiVersion: machineconfiguration.openshift.io/v1
    kind: MachineConfig
    metadata:
      name: 99-master-chrony-site
      labels:
        machineconfiguration.openshift.io/role: master
    spec:
      config:
        ignition:
          version: 3.2.0
        storage:
          files:
            - path: /etc/chrony.conf
              mode: 420
              overwrite: true
              contents:
                # chrony.conf — decoded content lives in
                # roles/site_manifests/vars/main.yml
                source: data:text/plain;charset=utf-8;base64,
