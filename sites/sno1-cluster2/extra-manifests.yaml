# Install-time manifests for sno1-cluster2, referenced from the ClusterInstance via
# spec.extraManifestsRefs. The SiteConfig operator passes this ConfigMap to the
# Assisted Installer, which applies its contents to the spoke while the cluster
# is being installed -- so every site comes up already configured, with no
# post-install drift to remediate.
#
# Applied at install time only: changing this on a running cluster does nothing
# until the site is reinstalled.
#
# Generated by scripts/04-render-sites.sh — edit scripts/lib/machineconfigs.sh.
apiVersion: v1
kind: ConfigMap
metadata:
  name: sno1-cluster2-extra-manifests
  namespace: sno1-cluster2
data:
  # Telco far-edge (RAN DU) profile — the slide 13 use case: reserve platform
  # CPUs at install time so every site boots with identical pinning.
  02-master-workload-partitioning.yaml: |
    apiVersion: machineconfiguration.openshift.io/v1
    kind: MachineConfig
    metadata:
      name: 02-master-workload-partitioning
      labels:
        machineconfiguration.openshift.io/role: master
    spec:
      config:
        ignition:
          version: 3.2.0
        storage:
          files:
              - path: /etc/crio/crio.conf.d/01-workload-partitioning
                mode: 420
                overwrite: true
                contents:
