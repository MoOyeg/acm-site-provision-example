#
# Ansible managed
#
# Install-time manifests for sno2-cluster2 (retail_edge profile),
# referenced from the ClusterInstance via spec.extraManifestsRefs.
#
# The SiteConfig operator passes this ConfigMap to the Assisted Installer, which
# applies its contents to the spoke while the cluster is being installed -- so
# the site comes up already configured, with no post-install drift to remediate.
#
# Applied at install time only: changing this on a running cluster does nothing
# until the site is reinstalled.
apiVersion: v1
kind: ConfigMap
metadata:
  name: sno2-cluster2-extra-manifests
  namespace: sno2-cluster2
data:
  99-master-journald-limits.yaml: |
    apiVersion: machineconfiguration.openshift.io/v1
    kind: MachineConfig
    metadata:
      name: 99-master-journald-limits
      labels:
        machineconfiguration.openshift.io/role: master
    spec:
      config:
        ignition:
          version: 3.2.0
        storage:
          files:
            - path: /etc/systemd/journald.conf
              mode: 420
              overwrite: true
              contents:
                # journald.conf — decoded content lives in
                # roles/site_manifests/vars/main.yml
                source: data:text/plain;charset=utf-8;base64,
  99-master-chrony-site.yaml: |
    apiVersion: machineconfiguration.openshift.io/v1
    kind: MachineConfig
    metadata:
      name: 99-master-chrony-site
      labels:
        machineconfiguration.openshift.io/role: master
    spec:
      config:
        ignition:
          version: 3.2.0
        storage:
          files:
            - path: /etc/chrony.conf
              mode: 420
              overwrite: true
              contents:
                # chrony.conf — decoded content lives in
                # roles/site_manifests/vars/main.yml
                source: data:text/plain;charset=utf-8;base64,c2VydmVyIDE5Mi4xNjguNS41IGlidXJzdApkcmlmdGZpbGUgL3Zhci9saWIvY2hyb255L2RyaWZ0Cm1ha2VzdGVwIDEuMCAzCnJ0Y3N5bmMKbG9nZGlyIC92YXIvbG9nL2Nocm9ueQo=
