#
# Ansible managed
#
# Site definition for sno2-cluster2 — a single-node OpenShift cluster at a
# remote site.
#
# This file is the *what*: names, network, and each node's BMC. The *how* lives
# in the templates referenced by templateRefs, which the SiteConfig operator
# merges with this CR to render ClusterDeployment, AgentClusterInstall,
# InfraEnv, BareMetalHost, NMStateConfig, ManagedCluster and
# KlusterletAddonConfig.
apiVersion: siteconfig.open-cluster-management.io/v1alpha1
kind: ClusterInstance
metadata:
  name: sno2-cluster2
  namespace: sno2-cluster2
spec:
  clusterName: sno2-cluster2
  baseDomain: tide.lan
  clusterType: SNO
  clusterImageSetNameRef: img4.20.12-x86-64-appsub
  cpuArchitecture: x86_64
  networkType: OVNKubernetes
  pullSecretRef:
    name: pull-secret
  sshPublicKey: "ssh-rsa  moyo@rhel-idm"
  clusterNetwork:
    - cidr: 10.128.0.0/14
      hostPrefix: 23
  serviceNetwork:
    - cidr: 172.30.0.0/16
  machineNetwork:
    - cidr: 192.168.4.0/23
  # Swap these for ibi-* templates to install the same site with the
  # Image-Based Installer instead — the site definition does not change.
  templateRefs:
    - name: ai-cluster-templates-v1
      namespace: open-cluster-management
  # Install-time manifests applied to THIS SITE's cluster (extra-manifests.yaml).
  # These reach the spoke; templateRefs above render onto the hub.
  #
  # Immutable once the ClusterInstance exists, so it is only emitted for sites
  # that are not provisioned yet — otherwise the admission webhook rejects the
  # change and Argo CD can never sync.
  extraManifestsRefs:
    - name: sno2-cluster2-extra-manifests
  nodes:
    - hostName: "sno2.sno2-cluster2.tide.lan"
      role: master
      bootMode: legacy
      automatedCleaningMode: disabled
      # The libvirt domain behind the sushy-tools Redfish emulator. The operator
      # renders the BareMetalHost from this and Ironic drives the machine over
      # Redfish virtual media.
      bmcAddress: "redfish-virtualmedia://192.168.5.132:8002/redfish/v1/Systems/92a26dd5-6fab-47d9-ad35-c4379feedc04"
      bmcCredentialsName:
        name: sno2-bmc-credentials
      bootMACAddress: "52:54:00:a2:00:01"
      rootDeviceHints:
        deviceName: /dev/vda
      nodeNetwork:
        # Rendered into an NMStateConfig by the node template. The MAC is mapped
        # to the logical name used below, so nmstate binds to the right NIC
        # regardless of how the guest enumerates it.
        interfaces:
          - name: enp1s0
            macAddress: "52:54:00:a2:00:01"
        config:
          interfaces:
            - name: enp1s0
              type: ethernet
              state: up
              ipv4:
                enabled: true
                dhcp: false
                address:
                  - ip: 192.168.5.201
                    prefix-length: 23
              ipv6:
                enabled: false
          dns-resolver:
            config:
              server:
                - 192.168.5.5
          routes:
            config:
              - destination: 0.0.0.0/0
                next-hop-address: 192.168.5.5
                next-hop-interface: enp1s0
      templateRefs:
        - name: ai-node-templates-v1
          namespace: open-cluster-management
