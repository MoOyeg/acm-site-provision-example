#
# Ansible managed
#
# Governance, not installation: which clusters get the HPE StorageClass is
# decided by a label, and ACM keeps it that way.
#
# Label a managed cluster with
#   storage.tide.lan/hpe-csi=enabled
# and the Placement below selects it, the PlacementBinding ties this Policy to
# that Placement, and the ConfigurationPolicy enforces the StorageClass on it.
# Remove the label and the cluster simply drops out of the Placement.
#
# The Policy deliberately does NOT carry the TrueNAS credentials. The
# truenas-secret and the CSI driver itself are installed out of band by
# roles/tnf_storage, because a Secret in Git is a Secret in everyone's clone.
# A StorageClass referencing a not-yet-present driver is harmless -- it simply
# does not provision until the driver arrives.
#
# The second template is a prerequisite the driver enforces rather than a
# storage object. RHCOS ships /etc/nvme/hostnqn inside the image, so every node
# installed from the same image boots with an identical NVMe host NQN. The HPE
# CSI node plugin validates NQN uniqueness and refuses to register on the second
# node it sees ("Duplicate NQN ... will cause data corruption"), which silently
# limits the cluster to one storage-capable node. The MachineConfig regenerates
# the NQN from each node's own DMI system UUID, which is unique per machine.
#
# NOTE: this is a MachineConfig. Labelling a cluster into this tier therefore
# triggers a rolling reboot of its nodes the first time the policy applies.
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: hpe-storageclass
  namespace: open-cluster-management-global-set
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
    policy.open-cluster-management.io/description: >-
      Ensures the HPE CSI StorageClass and VolumeSnapshotClass exist on every
      cluster labelled for TrueNAS-backed storage.
spec:
  remediationAction: enforce
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: hpe-storageclass-config
        spec:
          remediationAction: enforce
          severity: medium
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: storage.k8s.io/v1
                kind: StorageClass
                metadata:
                  name: hpe-storageclass
                  annotations:
                    storageclass.kubernetes.io/is-default-class: "true"
                provisioner: csi.hpe.com
                parameters:
                  csi.storage.k8s.io/controller-expand-secret-name: truenas-secret
                  csi.storage.k8s.io/controller-expand-secret-namespace: hpe-storage
                  csi.storage.k8s.io/controller-publish-secret-name: truenas-secret
                  csi.storage.k8s.io/controller-publish-secret-namespace: hpe-storage
                  csi.storage.k8s.io/node-publish-secret-name: truenas-secret
                  csi.storage.k8s.io/node-publish-secret-namespace: hpe-storage
                  csi.storage.k8s.io/node-stage-secret-name: truenas-secret
                  csi.storage.k8s.io/node-stage-secret-namespace: hpe-storage
                  csi.storage.k8s.io/provisioner-secret-name: truenas-secret
                  csi.storage.k8s.io/provisioner-secret-namespace: hpe-storage
                  csi.storage.k8s.io/fstype: xfs
                  allowOverrides: sparse,compression,deduplication,volblocksize,sync,description
                  root: Main/openshift-csi
                reclaimPolicy: Delete
                allowVolumeExpansion: true
            - complianceType: musthave
              objectDefinition:
                apiVersion: snapshot.storage.k8s.io/v1
                kind: VolumeSnapshotClass
                metadata:
                  name: hpe-storageclass-snap
                driver: csi.hpe.com
                deletionPolicy: Delete
                parameters:
                  csi.storage.k8s.io/snapshotter-secret-name: truenas-secret
                  csi.storage.k8s.io/snapshotter-secret-namespace: hpe-storage
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: hpe-storageclass-unique-nqn
        spec:
          remediationAction: enforce
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: machineconfiguration.openshift.io/v1
                kind: MachineConfig
                metadata:
                  name: 99-master-unique-nvme-hostnqn
                  labels:
                    machineconfiguration.openshift.io/role: master
                spec:
                  config:
                    ignition:
                      version: 3.4.0
                    systemd:
                      units:
                        - name: nvme-unique-hostnqn.service
                          enabled: true
                          contents: |
                            [Unit]
                            Description=Derive a unique NVMe host NQN from the system UUID
                            Before=kubelet.service
                            ConditionPathExists=/sys/class/dmi/id/product_uuid

                            [Service]
                            Type=oneshot
                            RemainAfterExit=yes
                            ExecStart=/bin/bash -c 'mkdir -p /etc/nvme && echo "nqn.2014-08.org.nvmexpress:uuid:$(cat /sys/class/dmi/id/product_uuid)" > /etc/nvme/hostnqn'

                            [Install]
                            WantedBy=multi-user.target
            - complianceType: musthave
              objectDefinition:
                apiVersion: machineconfiguration.openshift.io/v1
                kind: MachineConfig
                metadata:
                  name: 99-worker-unique-nvme-hostnqn
                  labels:
                    machineconfiguration.openshift.io/role: worker
                spec:
                  config:
                    ignition:
                      version: 3.4.0
                    systemd:
                      units:
                        - name: nvme-unique-hostnqn.service
                          enabled: true
                          contents: |
                            [Unit]
                            Description=Derive a unique NVMe host NQN from the system UUID
                            Before=kubelet.service
                            ConditionPathExists=/sys/class/dmi/id/product_uuid

                            [Service]
                            Type=oneshot
                            RemainAfterExit=yes
                            ExecStart=/bin/bash -c 'mkdir -p /etc/nvme && echo "nqn.2014-08.org.nvmexpress:uuid:$(cat /sys/class/dmi/id/product_uuid)" > /etc/nvme/hostnqn'

                            [Install]
                            WantedBy=multi-user.target
---
# Selects clusters purely by the capability's custom label. clusterSets: [global]
# is the set that matches every managed cluster, and the ManagedClusterSetBinding
# for it already exists in this namespace, so the label is the only real filter.
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: hpe-storageclass-placement
  namespace: open-cluster-management-global-set
spec:
  clusterSets:
    - global
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchLabels:
            storage.tide.lan/hpe-csi: "enabled"
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: hpe-storageclass-binding
  namespace: open-cluster-management-global-set
placementRef:
  name: hpe-storageclass-placement
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: hpe-storageclass
    apiGroup: policy.open-cluster-management.io
    kind: Policy
