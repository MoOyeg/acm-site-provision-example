#
# Ansible managed
#
# MCE + HyperShift — lets this cluster host control planes, installed on any cluster labelled
#   hosting.tide.lan/hosted-control-planes=enabled
#
# MCE is what ships and manages the HyperShift operator, so this is the policy
# that turns an ordinary managed cluster into one that can host other clusters'
# control planes. The hub already runs MCE; this puts a second, independent MCE
# on the spoke, because in the co-located topology the control plane pods and
# the worker VMs both live there.
#
# CAUTION, learned the hard way. A second MCE on a cluster that is *already
# managed by an ACM hub* is a fight over one namespace: see the note on
# local-cluster below. With local-cluster disabled this policy installs MCE
# without disturbing the hub's klusterlet, but it also no longer deploys the
# HyperShift operator, because that arrives via the local-cluster addon.
#
# The supported way to make a *managed* cluster host control planes is from the
# hub instead: enable hypershift on the hub's own MCE and create a
# `hypershift-addon` ManagedClusterAddOn in the managed cluster's namespace. The
# hub then installs the HyperShift operator onto the spoke through the addon,
# with no second MCE and no klusterlet collision.
#
# Depends on the OpenShift Virtualization policy: HyperShift's KubeVirt provider
# needs a cluster that can actually run VMs, and ACM will hold this policy as
# Pending until that one reports Compliant rather than installing into a cluster
# that is not ready for it.
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: multicluster-engine
  namespace: open-cluster-management-global-set
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
    policy.open-cluster-management.io/description: >-
      Installs multicluster engine and the HyperShift operator on every cluster
      labelled to host control planes.
spec:
  remediationAction: enforce
  disabled: false
  dependencies:
    - name: openshift-virtualization
      namespace: open-cluster-management-global-set
      apiVersion: policy.open-cluster-management.io/v1
      kind: Policy
      compliance: Compliant
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: multicluster-engine-operator
        spec:
          remediationAction: enforce
          severity: medium
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Namespace
                metadata:
                  name: multicluster-engine
            - complianceType: musthave
              objectDefinition:
                apiVersion: operators.coreos.com/v1
                kind: OperatorGroup
                metadata:
                  name: multicluster-engine
                  namespace: multicluster-engine
                spec:
                  targetNamespaces:
                    - multicluster-engine
            - complianceType: musthave
              objectDefinition:
                apiVersion: operators.coreos.com/v1alpha1
                kind: Subscription
                metadata:
                  name: multicluster-engine
                  namespace: multicluster-engine
                spec:
                  source: redhat-operators
                  sourceNamespace: openshift-marketplace
                  name: multicluster-engine
                  installPlanApproval: Automatic
                  # No channel is pinned on purpose. Channel names differ
                  # between OCP versions, and a channel that does not exist
                  # gives a Subscription that silently installs nothing -- this
                  # policy has to work on clusters running versions the hub does
                  # not. With spec.channel unset, OLM resolves the package's own
                  # default channel on the target cluster, which is the right
                  # answer everywhere.
                  #
                  # An ACM `lookup` of the PackageManifest would express the same
                  # thing, but ACM template lookups establish a watch and
                  # PackageManifest is an aggregated API that does not support
                  # one: "cannot be watched: watch not supported on this
                  # resource".

    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: multicluster-engine-instance
        spec:
          remediationAction: enforce
          severity: medium
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: multicluster.openshift.io/v1
                kind: MultiClusterEngine
                metadata:
                  name: multiclusterengine
                spec:
                  overrides:
                    components:
                      - name: hypershift
                        enabled: true
                      # local-cluster is deliberately FALSE, and this is the
                      # important line in the file.
                      #
                      # Enabling it makes MCE import the cluster into itself,
                      # which installs a klusterlet in
                      # open-cluster-management-agent pointing at its own API.
                      # That namespace already holds the klusterlet the ACM hub
                      # installed, and a klusterlet is a singleton -- so the
                      # self-import silently takes it over, the hub's lease
                      # stops, ACM taints the cluster `unreachable`, and every
                      # Placement drops it. The cluster keeps running perfectly
                      # while quietly ceasing to be managed.
                      - name: local-cluster
                        enabled: false
                      # Requires local-cluster, so it goes with it.
                      - name: hypershift-local-hosting
                        enabled: false
---
# Selects clusters purely by the capability's custom label. clusterSets: [global]
# is the set that matches every managed cluster, and the ManagedClusterSetBinding
# for it already exists in this namespace, so the label is the only real filter.
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: multicluster-engine-placement
  namespace: open-cluster-management-global-set
spec:
  clusterSets:
    - global
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchLabels:
            hosting.tide.lan/hosted-control-planes: "enabled"
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: multicluster-engine-binding
  namespace: open-cluster-management-global-set
placementRef:
  name: multicluster-engine-placement
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: multicluster-engine
    apiGroup: policy.open-cluster-management.io
    kind: Policy
